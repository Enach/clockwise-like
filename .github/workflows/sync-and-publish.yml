name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Backend: lint ────────────────────────────────────────────────────────────
  lint-backend:
    name: Lint — Backend
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run lint
        working-directory: backend
        run: $(go env GOPATH)/bin/golangci-lint run --config ../.golangci.yml

  # ── Backend: test ────────────────────────────────────────────────────────────
  test-backend:
    name: Test — Backend
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # Tests spin up postgres via testcontainers — Docker daemon is available
      # on ubuntu-latest runners, no separate service container needed.
      - name: Run tests
        working-directory: backend
        run: go test ./... -race -timeout 120s -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: warn
          retention-days: 7

  # ── MCP: lint ────────────────────────────────────────────────────────────────
  lint-mcp:
    name: Lint — MCP
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod

      - name: Download dependencies
        working-directory: mcp
        run: go mod download

      - name: go vet
        working-directory: mcp
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run lint
        working-directory: mcp
        run: $(go env GOPATH)/bin/golangci-lint run --config ../.golangci.yml

  # ── MCP: test (compile check) ────────────────────────────────────────────────
  test-mcp:
    name: Test — MCP
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod

      - name: Build (compile check)
        working-directory: mcp
        run: go build ./...

      - name: Run tests
        working-directory: mcp
        run: go test ./... -race -timeout 60s

  # ── Build & Push Docker images ───────────────────────────────────────────────
  # Runs only on push to main, after all lint + test jobs pass.
  build-and-push:
    name: Build & Push
    needs: [lint-backend, test-backend, lint-mcp, test-mcp]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            enach/paceday-backend:latest
            enach/paceday-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            enach/paceday-frontend:latest
            enach/paceday-frontend:${{ github.sha }}

      - name: Build and push mcp-server
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            enach/paceday-mcp:latest
            enach/paceday-mcp:${{ github.sha }}

      - name: Build and push docs
        uses: docker/build-push-action@v6
        with:
          context: ./docs
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            enach/paceday-docs:latest
            enach/paceday-docs:${{ github.sha }}
