name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# All jobs run on self-hosted runners sharing a single Docker daemon on the
# same host. Build jobs write images to the daemon; downstream scan/push jobs
# reference them by tag — no artifact upload/download needed.

# ══════════════════════════════════════════════════════════════════════════════
# BACKEND
# ══════════════════════════════════════════════════════════════════════════════

jobs:

  lint-backend:
    name: Backend — Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run lint
        working-directory: backend
        run: $(go env GOPATH)/bin/golangci-lint run --config ../.golangci.yml

  test-backend:
    name: Backend — Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test ./... -race -timeout 300s -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: warn
          retention-days: 3

  build-backend:
    name: Backend — Build
    needs: [lint-backend, test-backend]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Prune stale images
        run: docker image prune -f || true

      - name: Build image
        run: docker build -t paceday-backend:${{ github.sha }} ./backend

  scan-backend:
    name: Backend — Security Scan
    needs: [build-backend]
    runs-on: self-hosted
    steps:
      - name: Scan with Trivy
        run: |
          mkdir -p ${{ runner.temp }}/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b ${{ runner.temp }}/bin
          ${{ runner.temp }}/bin/trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --cache-dir ${{ runner.temp }}/trivy-${{ github.run_id }}-backend \
            paceday-backend:${{ github.sha }}

      - name: Cleanup image (PR only)
        if: github.event_name == 'pull_request'
        run: docker rmi paceday-backend:${{ github.sha }} || true

  push-backend:
    name: Backend — Push
    needs: [scan-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-backend:${{ github.sha }} enach/paceday-backend:latest
          docker tag paceday-backend:${{ github.sha }} enach/paceday-backend:${{ github.sha }}
          docker push enach/paceday-backend:latest
          docker push enach/paceday-backend:${{ github.sha }}

      - name: Cleanup image
        if: always()
        run: docker rmi paceday-backend:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
# MCP
# ══════════════════════════════════════════════════════════════════════════════

  lint-mcp:
    name: MCP — Lint
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod

      - name: Download dependencies
        working-directory: mcp
        run: go mod download

      - name: go vet
        working-directory: mcp
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        env:
          GOFLAGS: ''

      - name: Run lint
        working-directory: mcp
        run: $(go env GOPATH)/bin/golangci-lint run --config ../.golangci.yml

  test-mcp:
    name: MCP — Test
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod

      - name: Build (compile check)
        working-directory: mcp
        run: go build ./...

      - name: Run tests
        working-directory: mcp
        run: go test ./... -race -timeout 60s

  build-mcp:
    name: MCP — Build
    needs: [lint-mcp, test-mcp]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Prune stale images
        run: docker image prune -f || true

      - name: Build image
        run: docker build -t paceday-mcp:${{ github.sha }} ./mcp

  scan-mcp:
    name: MCP — Security Scan
    needs: [build-mcp]
    runs-on: self-hosted
    steps:
      - name: Scan with Trivy
        run: |
          mkdir -p ${{ runner.temp }}/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b ${{ runner.temp }}/bin
          ${{ runner.temp }}/bin/trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --cache-dir ${{ runner.temp }}/trivy-${{ github.run_id }}-mcp \
            paceday-mcp:${{ github.sha }}

      - name: Cleanup image (PR only)
        if: github.event_name == 'pull_request'
        run: docker rmi paceday-mcp:${{ github.sha }} || true

  push-mcp:
    name: MCP — Push
    needs: [scan-mcp]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-mcp:${{ github.sha }} enach/paceday-mcp:latest
          docker tag paceday-mcp:${{ github.sha }} enach/paceday-mcp:${{ github.sha }}
          docker push enach/paceday-mcp:latest
          docker push enach/paceday-mcp:${{ github.sha }}

      - name: Cleanup image
        if: always()
        run: docker rmi paceday-mcp:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
# FRONTEND
# ══════════════════════════════════════════════════════════════════════════════

  build-frontend:
    name: Frontend — Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest frontend source
        shell: bash
        run: |
          KEY=${{ runner.temp }}/frontend_deploy_key_${{ github.run_id }}
          mkdir -p ~/.ssh
          echo "${{ secrets.FRONTEND_DEPLOY_KEY }}" > "$KEY"
          chmod 600 "$KEY"
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          rm -rf frontend
          GIT_SSH_COMMAND="ssh -i $KEY" \
            git clone --depth 1 git@github.com:Enach/smart-calendar-flow.git frontend
          rm -f "$KEY"

      - name: Prune stale images
        run: docker image prune -f || true

      - name: Build image
        run: docker build -f docker/frontend.dockerfile -t paceday-frontend:${{ github.sha }} .

  scan-frontend:
    name: Frontend — Security Scan
    needs: [build-frontend]
    runs-on: self-hosted
    steps:
      - name: Scan with Trivy
        run: |
          mkdir -p ${{ runner.temp }}/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b ${{ runner.temp }}/bin
          ${{ runner.temp }}/bin/trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --cache-dir ${{ runner.temp }}/trivy-${{ github.run_id }}-frontend \
            paceday-frontend:${{ github.sha }}

      - name: Cleanup image (PR only)
        if: github.event_name == 'pull_request'
        run: docker rmi paceday-frontend:${{ github.sha }} || true

  push-frontend:
    name: Frontend — Push
    needs: [scan-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-frontend:${{ github.sha }} enach/paceday-frontend:latest
          docker tag paceday-frontend:${{ github.sha }} enach/paceday-frontend:${{ github.sha }}
          docker push enach/paceday-frontend:latest
          docker push enach/paceday-frontend:${{ github.sha }}

      - name: Cleanup image
        if: always()
        run: docker rmi paceday-frontend:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
# DOCS
# ══════════════════════════════════════════════════════════════════════════════

  build-docs:
    name: Docs — Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Prune stale images
        run: docker image prune -f || true

      - name: Build image
        run: docker build -f docs/Dockerfile -t paceday-docs:${{ github.sha }} .

  scan-docs:
    name: Docs — Security Scan
    needs: [build-docs]
    runs-on: self-hosted
    steps:
      - name: Scan with Trivy
        run: |
          mkdir -p ${{ runner.temp }}/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b ${{ runner.temp }}/bin
          ${{ runner.temp }}/bin/trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --cache-dir ${{ runner.temp }}/trivy-${{ github.run_id }}-docs \
            paceday-docs:${{ github.sha }}

      - name: Cleanup image (PR only)
        if: github.event_name == 'pull_request'
        run: docker rmi paceday-docs:${{ github.sha }} || true

  push-docs:
    name: Docs — Push
    needs: [scan-docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-docs:${{ github.sha }} enach/paceday-docs:latest
          docker tag paceday-docs:${{ github.sha }} enach/paceday-docs:${{ github.sha }}
          docker push enach/paceday-docs:latest
          docker push enach/paceday-docs:${{ github.sha }}

      - name: Cleanup image
        if: always()
        run: docker rmi paceday-docs:${{ github.sha }} || true
