name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [frontend-push]
  workflow_dispatch:

# All jobs run on self-hosted runners sharing a single Docker daemon on the
# same host. Build jobs write images to the daemon; downstream scan/push jobs
# reference them by tag — no artifact upload/download needed.
# Frontend source: cloned from smart-calendar-flow main at run time.
#
# Pipeline structure per component:
#   Phase 1 │ lint · test · quality (parallel) + build (needs lint, test)
#   Phase 2 │ sast · dast · scan               (parallel, need build)
#   Phase 3 │ push                              (needs quality + all phase-2)

jobs:

# ══════════════════════════════════════════════════════════════════════════════
# BACKEND — Phase 1: Lint · Test · Quality · Build
# ══════════════════════════════════════════════════════════════════════════════

  lint-backend:
    name: Backend — Lint
    runs-on: self-hosted
    env:
      GOCACHE: /tmp/go-build-${{ github.run_id }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum


      - name: Install golangci-lint
        working-directory: backend
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Run lint
        working-directory: backend
        run: $(go env GOPATH)/bin/golangci-lint run --config ../.golangci.yml

  test-backend:
    name: Backend — Test
    runs-on: self-hosted
    env:
      GOCACHE: /tmp/go-build-${{ github.run_id }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum


      - name: Run tests
        working-directory: backend
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test ./... -race -timeout 300s -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: warn
          retention-days: 3

  quality-backend:
    name: Backend — Code Quality
    runs-on: self-hosted
    env:
      GOCACHE: /tmp/go-build-${{ github.run_id }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum


      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Informational — transitive dep vulns shouldn't gate deploys
      - name: Vulnerability scan
        working-directory: backend
        run: $(go env GOPATH)/bin/govulncheck ./...
        continue-on-error: true

      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: Cyclomatic complexity (max 35)
        working-directory: backend
        run: $(go env GOPATH)/bin/gocyclo -over 35 .

  build-backend:
    name: Backend — Build
    needs: [lint-backend, test-backend]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Prune stale images
        run: docker image prune -f || true

      - name: Build image
        run: docker build -t paceday-backend:${{ github.sha }} ./backend

# ══════════════════════════════════════════════════════════════════════════════
# BACKEND — Phase 2: SAST · DAST · Security Scan
# ══════════════════════════════════════════════════════════════════════════════

  sast-backend:
    name: Backend — SAST
    needs: [build-backend]
    runs-on: self-hosted
    env:
      GOCACHE: /tmp/go-build-${{ github.run_id }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum


      - name: Install gosec
        working-directory: backend
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        working-directory: backend
        run: $(go env GOPATH)/bin/gosec -fmt=text ./...
        continue-on-error: true

  dast-backend:
    name: Backend — DAST
    needs: [build-backend]
    runs-on: self-hosted
    steps:
      - name: Create DAST network
        run: docker network create dast-backend-${{ github.run_id }}

      - name: Start postgres
        run: |
          docker run -d --name dast-pg-${{ github.run_id }} \
            --network dast-backend-${{ github.run_id }} \
            -e POSTGRES_DB=clockwise \
            -e POSTGRES_USER=clockwise \
            -e POSTGRES_PASSWORD=dast_test_only \
            postgres:16-alpine
          until docker run --rm --network dast-backend-${{ github.run_id }} \
            postgres:16-alpine pg_isready -h dast-pg-${{ github.run_id }} -U clockwise; \
            do sleep 2; done

      - name: Start backend
        run: |
          docker run -d --name dast-be-${{ github.run_id }} \
            --network dast-backend-${{ github.run_id }} \
            -e PORT=8080 \
            -e DATABASE_URL="postgres://clockwise:dast_test_only@dast-pg-${{ github.run_id }}:5432/clockwise?sslmode=disable" \
            -e JWT_SECRET=dast-jwt-not-for-production \
            -e SESSION_SECRET=dast-session-not-for-production \
            -e GOOGLE_CLIENT_ID=dast-fake-id \
            -e GOOGLE_CLIENT_SECRET=dast-fake-secret \
            -e GOOGLE_REDIRECT_URL=http://localhost:8080/callback \
            paceday-backend:${{ github.sha }}

      - name: Wait for health endpoint
        run: |
          for i in $(seq 1 30); do
            docker run --rm --network dast-backend-${{ github.run_id }} \
              curlimages/curl:latest \
              curl -sf http://dast-be-${{ github.run_id }}:8080/api/health && break || sleep 2
          done

      - name: ZAP baseline scan
        run: |
          docker run --rm \
            --network dast-backend-${{ github.run_id }} \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://dast-be-${{ github.run_id }}:8080 \
            -I
        continue-on-error: true

      - name: Cleanup
        if: always()
        run: |
          docker rm -f dast-be-${{ github.run_id }} dast-pg-${{ github.run_id }} || true
          docker network rm dast-backend-${{ github.run_id }} || true

  scan-backend:
    name: Backend — Security Scan
    needs: [build-backend]
    runs-on: self-hosted
    steps:
      - name: Scan with Trivy
        run: |
          mkdir -p /tmp/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /tmp/bin
          /tmp/bin/trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --cache-dir /tmp/trivy-${{ github.run_id }}-backend \
            paceday-backend:${{ github.sha }}

      - name: Cleanup image (PR only)
        if: github.event_name == 'pull_request'
        run: docker rmi paceday-backend:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
# BACKEND — Phase 3: Push
# ══════════════════════════════════════════════════════════════════════════════

  push-backend:
    name: Backend — Push
    needs: [quality-backend, sast-backend, dast-backend, scan-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-backend:${{ github.sha }} enach/paceday-backend:latest
          docker tag paceday-backend:${{ github.sha }} enach/paceday-backend:${{ github.sha }}
          docker push enach/paceday-backend:latest
          docker push enach/paceday-backend:${{ github.sha }}

      - name: Cleanup image
        if: always()
        run: docker rmi paceday-backend:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
# FRONTEND — Phase 1: Lint · Test · Quality · Build
# ══════════════════════════════════════════════════════════════════════════════

  lint-frontend:
    name: Frontend — Lint
    runs-on: self-hosted
    steps:
      - name: Checkout frontend source
        shell: bash
        run: |
          KEY=/tmp/fdk_${{ github.run_id }}_lint
          mkdir -p ~/.ssh
          echo "${{ secrets.FRONTEND_DEPLOY_KEY }}" > "$KEY"
          chmod 600 "$KEY"
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          GIT_SSH_COMMAND="ssh -i $KEY" \
            git clone --depth 1 git@github.com:Enach/smart-calendar-flow.git .
          rm -f "$KEY"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  test-frontend:
    name: Frontend — Test
    runs-on: self-hosted
    steps:
      - name: Checkout frontend source
        shell: bash
        run: |
          KEY=/tmp/fdk_${{ github.run_id }}_test
          mkdir -p ~/.ssh
          echo "${{ secrets.FRONTEND_DEPLOY_KEY }}" > "$KEY"
          chmod 600 "$KEY"
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          GIT_SSH_COMMAND="ssh -i $KEY" \
            git clone --depth 1 git@github.com:Enach/smart-calendar-flow.git .
          rm -f "$KEY"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --legacy-peer-deps
      - run: npm test

  quality-frontend:
    name: Frontend — Code Quality
    runs-on: self-hosted
    steps:
      - name: Checkout frontend source
        shell: bash
        run: |
          KEY=/tmp/fdk_${{ github.run_id }}_quality
          mkdir -p ~/.ssh
          echo "${{ secrets.FRONTEND_DEPLOY_KEY }}" > "$KEY"
          chmod 600 "$KEY"
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          GIT_SSH_COMMAND="ssh -i $KEY" \
            git clone --depth 1 git@github.com:Enach/smart-calendar-flow.git .
          rm -f "$KEY"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit

      # Informational — third-party dep vulns shouldn't gate our own deploys
      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  build-frontend:
    name: Frontend — Build
    needs: [lint-frontend, test-frontend]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest frontend source
        shell: bash
        run: |
          KEY=/tmp/frontend_deploy_key_${{ github.run_id }}
          mkdir -p ~/.ssh
          echo "${{ secrets.FRONTEND_DEPLOY_KEY }}" > "$KEY"
          chmod 600 "$KEY"
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          rm -rf frontend
          GIT_SSH_COMMAND="ssh -i $KEY" \
            git clone --depth 1 git@github.com:Enach/smart-calendar-flow.git frontend
          rm -f "$KEY"

      - name: Prune stale images
        run: docker image prune -f || true

      - name: Build image
        run: docker build -f docker/frontend.dockerfile -t paceday-frontend:${{ github.run_id }} .

# ══════════════════════════════════════════════════════════════════════════════
# FRONTEND — Phase 2: SAST · DAST · Security Scan
# ══════════════════════════════════════════════════════════════════════════════

  sast-frontend:
    name: Frontend — SAST
    needs: [build-frontend]
    runs-on: self-hosted
    steps:
      - name: Checkout frontend source
        shell: bash
        run: |
          KEY=/tmp/fdk_${{ github.run_id }}_sast
          mkdir -p ~/.ssh
          echo "${{ secrets.FRONTEND_DEPLOY_KEY }}" > "$KEY"
          chmod 600 "$KEY"
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          GIT_SSH_COMMAND="ssh -i $KEY" \
            git clone --depth 1 git@github.com:Enach/smart-calendar-flow.git .
          rm -f "$KEY"

      - name: Install Semgrep
        run: python3 -m pip install semgrep --break-system-packages

      - name: Semgrep scan
        run: |
          python3 -m semgrep scan \
            --config "p/typescript" \
            --config "p/react" \
            --config "p/secrets" \
            --error \
            src/

  dast-frontend:
    name: Frontend — DAST
    needs: [build-frontend]
    runs-on: self-hosted
    steps:
      - name: Checkout frontend source
        shell: bash
        run: |
          KEY=/tmp/fdk_${{ github.run_id }}_dast
          mkdir -p ~/.ssh
          echo "${{ secrets.FRONTEND_DEPLOY_KEY }}" > "$KEY"
          chmod 600 "$KEY"
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          GIT_SSH_COMMAND="ssh -i $KEY" \
            git clone --depth 1 git@github.com:Enach/smart-calendar-flow.git .
          rm -f "$KEY"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: npm ci --legacy-peer-deps && npm run build

      - name: Start preview server
        run: |
          nohup npm run preview -- --port 4173 > /tmp/preview-${{ github.run_id }}.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173 && break || sleep 1
          done

      # host.docker.internal resolves to the Docker host from inside a container
      - name: ZAP baseline scan
        run: |
          docker run --rm \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://host.docker.internal:4173 \
            -I
        continue-on-error: true

      - name: Stop preview server
        if: always()
        run: pkill -f "vite preview" || true

  scan-frontend:
    name: Frontend — Security Scan
    needs: [build-frontend]
    runs-on: self-hosted
    steps:
      - name: Scan with Trivy
        run: |
          mkdir -p /tmp/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /tmp/bin
          /tmp/bin/trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --cache-dir /tmp/trivy-${{ github.run_id }}-frontend \
            paceday-frontend:${{ github.run_id }}

      - name: Cleanup image (PR only)
        if: github.event_name == 'pull_request'
        run: docker rmi paceday-frontend:${{ github.run_id }} || true

# ══════════════════════════════════════════════════════════════════════════════
# FRONTEND — Phase 3: Push
# ══════════════════════════════════════════════════════════════════════════════

  push-frontend:
    name: Frontend — Push
    needs: [quality-frontend, sast-frontend, dast-frontend, scan-frontend]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'repository_dispatch' ||
      github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-frontend:${{ github.run_id }} enach/paceday-frontend:latest
          docker push enach/paceday-frontend:latest

      - name: Cleanup image
        if: always()
        run: docker rmi paceday-frontend:${{ github.run_id }} || true

# ══════════════════════════════════════════════════════════════════════════════
# MCP — Phase 1: Lint · Test · Quality · Build
# ══════════════════════════════════════════════════════════════════════════════

  lint-mcp:
    name: MCP — Lint
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
      GOCACHE: /tmp/go-build-${{ github.run_id }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod

      - name: Download dependencies
        working-directory: mcp
        run: go mod download

      - name: go vet
        working-directory: mcp
        run: go vet ./...

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "/tmp/bin" v1.64.8

      - name: Run lint
        working-directory: mcp
        run: /tmp/bin/golangci-lint run --config ../.golangci.yml

  test-mcp:
    name: MCP — Test
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
      GOCACHE: /tmp/go-build-${{ github.run_id }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod

      - name: Build (compile check)
        working-directory: mcp
        run: go build ./...

      - name: Run tests
        working-directory: mcp
        run: go test ./... -race -timeout 60s

  quality-mcp:
    name: MCP — Code Quality
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
      GOCACHE: /tmp/go-build-${{ github.run_id }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod


      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: Cyclomatic complexity (max 20)
        working-directory: mcp
        run: $(go env GOPATH)/bin/gocyclo -over 20 .

  build-mcp:
    name: MCP — Build
    needs: [lint-mcp, test-mcp]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Prune stale images
        run: docker image prune -f || true

      - name: Build image
        run: docker build -t paceday-mcp:${{ github.sha }} ./mcp

# ══════════════════════════════════════════════════════════════════════════════
# MCP — Phase 2: SAST · Security Scan
# ══════════════════════════════════════════════════════════════════════════════

  sast-mcp:
    name: MCP — SAST
    needs: [build-mcp]
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
      GOCACHE: /tmp/go-build-${{ github.run_id }}-${{ github.job }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod


      - name: Install gosec
        working-directory: mcp
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        working-directory: mcp
        run: $(go env GOPATH)/bin/gosec -fmt=text ./...
        continue-on-error: true

  scan-mcp:
    name: MCP — Security Scan
    needs: [build-mcp]
    runs-on: self-hosted
    steps:
      - name: Scan with Trivy
        run: |
          mkdir -p /tmp/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /tmp/bin
          /tmp/bin/trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --cache-dir /tmp/trivy-${{ github.run_id }}-mcp \
            paceday-mcp:${{ github.sha }}

      - name: Cleanup image (PR only)
        if: github.event_name == 'pull_request'
        run: docker rmi paceday-mcp:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
# MCP — Phase 3: Push
# ══════════════════════════════════════════════════════════════════════════════

  push-mcp:
    name: MCP — Push
    needs: [quality-mcp, sast-mcp, scan-mcp]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-mcp:${{ github.sha }} enach/paceday-mcp:latest
          docker tag paceday-mcp:${{ github.sha }} enach/paceday-mcp:${{ github.sha }}
          docker push enach/paceday-mcp:latest
          docker push enach/paceday-mcp:${{ github.sha }}

      - name: Cleanup image
        if: always()
        run: docker rmi paceday-mcp:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
# DOCS — Phase 1: Build
# ══════════════════════════════════════════════════════════════════════════════

  build-docs:
    name: Docs — Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Prune stale images
        run: docker image prune -f || true

      - name: Build image
        run: docker build -f docs/Dockerfile -t paceday-docs:${{ github.sha }} .

# ══════════════════════════════════════════════════════════════════════════════
# DOCS — Phase 2: Security Scan
# ══════════════════════════════════════════════════════════════════════════════

  scan-docs:
    name: Docs — Security Scan
    needs: [build-docs]
    runs-on: self-hosted
    steps:
      - name: Scan with Trivy
        run: |
          mkdir -p /tmp/bin
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /tmp/bin
          /tmp/bin/trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --cache-dir /tmp/trivy-${{ github.run_id }}-docs \
            paceday-docs:${{ github.sha }}

      - name: Cleanup image (PR only)
        if: github.event_name == 'pull_request'
        run: docker rmi paceday-docs:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
# DOCS — Phase 3: Push
# ══════════════════════════════════════════════════════════════════════════════

  push-docs:
    name: Docs — Push
    needs: [scan-docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-docs:${{ github.sha }} enach/paceday-docs:latest
          docker tag paceday-docs:${{ github.sha }} enach/paceday-docs:${{ github.sha }}
          docker push enach/paceday-docs:latest
          docker push enach/paceday-docs:${{ github.sha }}

      - name: Cleanup image
        if: always()
        run: docker rmi paceday-docs:${{ github.sha }} || true
