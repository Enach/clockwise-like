name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Backend: lint ────────────────────────────────────────────────────────────
  lint-backend:
    name: Lint — Backend
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: backend
          args: --config ../.golangci.yml

  # ── Backend: test ────────────────────────────────────────────────────────────
  test-backend:
    name: Test — Backend
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # Tests spin up postgres via testcontainers — Docker daemon is available
      # on ubuntu-latest runners, no separate service container needed.
      - name: Run tests
        working-directory: backend
        run: go test ./... -race -timeout 120s -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          retention-days: 7

  # ── MCP: lint ────────────────────────────────────────────────────────────────
  lint-mcp:
    name: Lint — MCP
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod

      - name: Download dependencies
        working-directory: mcp
        run: go mod download

      - name: go vet
        working-directory: mcp
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: mcp
          args: --config ../.golangci.yml

  # ── MCP: test (compile check) ────────────────────────────────────────────────
  test-mcp:
    name: Test — MCP
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod

      - name: Build (compile check)
        working-directory: mcp
        run: go build ./...

      - name: Run tests
        working-directory: mcp
        run: go test ./... -race -timeout 60s

  # ── Build & Push Docker images ───────────────────────────────────────────────
  # Runs only on push to main, after all lint + test jobs pass.
  build-and-push:
    name: Build & Push
    needs: [lint-backend, test-backend, lint-mcp, test-mcp]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # SSH agent needed so the frontend Dockerfile can clone smart-calendar-flow
      - name: Set up SSH agent for frontend clone
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.FRONTEND_DEPLOY_KEY }}

      - name: Add github.com to known hosts
        run: ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/paceday-backend:latest
            ghcr.io/${{ github.repository_owner }}/paceday-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          ssh: default
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/paceday-frontend:latest
            ghcr.io/${{ github.repository_owner }}/paceday-frontend:${{ github.sha }}

      - name: Build and push mcp-server
        uses: docker/build-push-action@v6
        with:
          context: ./mcp
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/paceday-mcp:latest
            ghcr.io/${{ github.repository_owner }}/paceday-mcp:${{ github.sha }}
