name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ══════════════════════════════════════════════════════════════════════════════
# BACKEND
# ══════════════════════════════════════════════════════════════════════════════

jobs:

  lint-backend:
    name: Backend — Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run lint
        working-directory: backend
        run: $(go env GOPATH)/bin/golangci-lint run --config ../.golangci.yml

  test-backend:
    name: Backend — Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        run: go test ./... -race -timeout 120s -coverprofile=coverage.out

      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out
          if-no-files-found: warn
          retention-days: 7

  build-backend:
    name: Backend — Build
    needs: [lint-backend, test-backend]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t paceday-backend:${{ github.sha }} ./backend

      - name: Export image
        run: docker save paceday-backend:${{ github.sha }} | gzip > backend-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar.gz
          retention-days: 1

  scan-backend:
    name: Backend — Security Scan
    needs: [build-backend]
    runs-on: self-hosted
    permissions:
      security-events: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load image
        shell: bash
        run: docker load < <(gunzip -c backend-image.tar.gz)

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: paceday-backend:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
        env:
          TRIVY_CACHE_DIR: ${{ runner.temp }}/trivy-${{ github.run_id }}-backend

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: backend

  push-backend:
    name: Backend — Push
    needs: [scan-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load image
        shell: bash
        run: docker load < <(gunzip -c backend-image.tar.gz)

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-backend:${{ github.sha }} enach/paceday-backend:latest
          docker tag paceday-backend:${{ github.sha }} enach/paceday-backend:${{ github.sha }}
          docker push enach/paceday-backend:latest
          docker push enach/paceday-backend:${{ github.sha }}

      - name: Cleanup local image
        if: always()
        run: docker rmi paceday-backend:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
# MCP
# ══════════════════════════════════════════════════════════════════════════════

  lint-mcp:
    name: MCP — Lint
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod

      - name: Download dependencies
        working-directory: mcp
        run: go mod download

      - name: go vet
        working-directory: mcp
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run lint
        working-directory: mcp
        run: $(go env GOPATH)/bin/golangci-lint run --config ../.golangci.yml

  test-mcp:
    name: MCP — Test
    runs-on: self-hosted
    env:
      GONOSUMDB: '*'
      GOFLAGS: '-mod=mod'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/go.mod

      - name: Build (compile check)
        working-directory: mcp
        run: go build ./...

      - name: Run tests
        working-directory: mcp
        run: go test ./... -race -timeout 60s

  build-mcp:
    name: MCP — Build
    needs: [lint-mcp, test-mcp]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t paceday-mcp:${{ github.sha }} ./mcp

      - name: Export image
        run: docker save paceday-mcp:${{ github.sha }} | gzip > mcp-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-image
          path: mcp-image.tar.gz
          retention-days: 1

  scan-mcp:
    name: MCP — Security Scan
    needs: [build-mcp]
    runs-on: self-hosted
    permissions:
      security-events: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mcp-image

      - name: Load image
        shell: bash
        run: docker load < <(gunzip -c mcp-image.tar.gz)

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: paceday-mcp:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
        env:
          TRIVY_CACHE_DIR: ${{ runner.temp }}/trivy-${{ github.run_id }}-mcp

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: mcp

  push-mcp:
    name: MCP — Push
    needs: [scan-mcp]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mcp-image

      - name: Load image
        shell: bash
        run: docker load < <(gunzip -c mcp-image.tar.gz)

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-mcp:${{ github.sha }} enach/paceday-mcp:latest
          docker tag paceday-mcp:${{ github.sha }} enach/paceday-mcp:${{ github.sha }}
          docker push enach/paceday-mcp:latest
          docker push enach/paceday-mcp:${{ github.sha }}

      - name: Cleanup local image
        if: always()
        run: docker rmi paceday-mcp:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
# FRONTEND
# ══════════════════════════════════════════════════════════════════════════════

  build-frontend:
    name: Frontend — Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest frontend source
        shell: bash
        run: |
          KEY=${{ runner.temp }}/frontend_deploy_key_${{ github.run_id }}
          mkdir -p ~/.ssh
          echo "${{ secrets.FRONTEND_DEPLOY_KEY }}" > "$KEY"
          chmod 600 "$KEY"
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          rm -rf frontend
          GIT_SSH_COMMAND="ssh -i $KEY" \
            git clone --depth 1 git@github.com:Enach/smart-calendar-flow.git frontend
          rm -f "$KEY"

      - name: Build image
        run: docker build -t paceday-frontend:${{ github.sha }} ./frontend

      - name: Export image
        run: docker save paceday-frontend:${{ github.sha }} | gzip > frontend-image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: frontend-image.tar.gz
          retention-days: 1

  scan-frontend:
    name: Frontend — Security Scan
    needs: [build-frontend]
    runs-on: self-hosted
    permissions:
      security-events: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load image
        shell: bash
        run: docker load < <(gunzip -c frontend-image.tar.gz)

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: paceday-frontend:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
        env:
          TRIVY_CACHE_DIR: ${{ runner.temp }}/trivy-${{ github.run_id }}-frontend

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: frontend

  push-frontend:
    name: Frontend — Push
    needs: [scan-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-image

      - name: Load image
        shell: bash
        run: docker load < <(gunzip -c frontend-image.tar.gz)

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push
        run: |
          docker tag paceday-frontend:${{ github.sha }} enach/paceday-frontend:latest
          docker tag paceday-frontend:${{ github.sha }} enach/paceday-frontend:${{ github.sha }}
          docker push enach/paceday-frontend:latest
          docker push enach/paceday-frontend:${{ github.sha }}

      - name: Cleanup local image
        if: always()
        run: docker rmi paceday-frontend:${{ github.sha }} || true

# ══════════════════════════════════════════════════════════════════════════════
