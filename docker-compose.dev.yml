version: '3.9'

# Development overrides — expose ports, disable restart, add postgres port.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"
    restart: "no"

  backend:
    environment:
      - GO_ENV=development
    ports:
      - "8080:8080"
    restart: "no"

  frontend:
    restart: "no"

  docs:
    restart: "no"

  nginx:
    restart: "no"
