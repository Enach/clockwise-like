version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clockwise
      POSTGRES_USER: clockwise
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clockwise}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clockwise -d clockwise"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://clockwise:${POSTGRES_PASSWORD:-clockwise}@postgres:5432/clockwise?sslmode=disable
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL:-}
      - SESSION_SECRET=${SESSION_SECRET:-changeme}
      - JWT_SECRET=${JWT_SECRET:-}
      # Microsoft OAuth
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_REDIRECT_URL=${MICROSOFT_REDIRECT_URL:-}
      # Zoom OAuth
      - ZOOM_CLIENT_ID=${ZOOM_CLIENT_ID:-}
      - ZOOM_CLIENT_SECRET=${ZOOM_CLIENT_SECRET:-}
      - ZOOM_REDIRECT_URL=${ZOOM_REDIRECT_URL:-}
      # Slack OAuth (meeting briefs + daily recap)
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - SLACK_REDIRECT_URI=${SLACK_REDIRECT_URI:-}
      # Notion OAuth (meeting briefs)
      - NOTION_CLIENT_ID=${NOTION_CLIENT_ID:-}
      - NOTION_CLIENT_SECRET=${NOTION_CLIENT_SECRET:-}
      - NOTION_REDIRECT_URI=${NOTION_REDIRECT_URI:-}
      # LLM provider credentials (OpenAI, Anthropic, AWS Bedrock, Azure OpenAI,
      # Vertex AI, Ollama) are configured per-user in the Settings page and
      # stored in the database — no server-level env vars needed.
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped

  docs:
    build: ./docs
    restart: unless-stopped

  mcp-server:
    build: ./mcp
    environment:
      BACKEND_URL: http://backend:8080
      MCP_TRANSPORT: sse
      MCP_PORT: "3001"
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
